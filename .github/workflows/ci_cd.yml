name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install black isort flake8
      - run: black --check backend/
      - run: isort --check-only backend/
      - run: flake8 --count --select=E9,F63,F7,F82 --show-source --statistics backend/

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r backend/requirements.txt
      - run: pip install pytest
      - run: pytest backend/tests/ -v --tb=short
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: cd frontend && npm install && npm run build

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t llm-eval-platform:test .
      - run: |
          docker run -d --name test-container -p 8000:8000 \
            -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            llm-eval-platform:test
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          docker stop test-container
          docker rm test-container

  deploy:
    name: Deploy to HuggingFace Spaces
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install huggingface-hub
      - run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.create_repo(
              repo_id='${{ secrets.HF_USERNAME }}/LLM-Eval-Platform',
              repo_type='space',
              space_sdk='docker',
              exist_ok=True
          )
          api.upload_folder(
              folder_path='.',
              repo_id='${{ secrets.HF_USERNAME }}/LLM-Eval-Platform',
              repo_type='space',
              ignore_patterns=['*.pyc', '__pycache__', '.git', '.env', '*.db', 'logs/', 'node_modules/']
          )
          "
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
