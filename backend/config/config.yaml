app:
  name: "LLM Eval Platform"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8888

database:
  path: "database/eval_platform.db"

judge:
  provider: "groq"
  model: "llama-3.1-8b-instant"
  temperature: 0.0
  max_tokens: 1024

evaluation:
  default_dimensions:
    - factuality
    - relevance
    - coherence
    - safety
    - helpfulness
  batch_size: 5
  max_concurrent: 3

red_team:
  max_attacks_per_run: 50
  safety_threshold: 0.7

ab_testing:
  min_sample_size: 10
  confidence_level: 0.95

observability:
  retention_days: 30

cost:
  rates:
    groq:
      input_per_1m: 0.05
      output_per_1m: 0.08

logging:
  level: "INFO"
